# Franchise / universe collections — the survivors of the "Defaults own
# franchises" cleanup (2026-07-06). Originally ~145 hand-curated TMDb Collection
# ID lists (built with tmdb_collection_details) ported from the LIVE 2023 config
# (Movies.yml). The bulk that merely duplicated a Kometa franchise Default (same
# TMDb collection, Default supplies canonical name/summary/poster) were removed,
# as were the 8 tmdb_movie augments (Ghostbusters, Godzilla, Hannibal, Lego
# Movie, Nightmare on Elm St, Oceans, Resident Evil, The Muppets — dropped
# 2026-07-06, user chose fully-defaults-own over realizing the extra films).
# What REMAINS here adds value the Default can't reproduce:
#   * pure manual lists (tmdb_movie / imdb_list only) — Unbreakable, Monsterverse,
#     The Addams Family;
#   * franchises the Default doesn't currently own (its collection isn't built in
#     this library) — the remaining single-collection entries, kept as the safe
#     direction. These are COMPLEMENTS to the `universe` Default (kept in config.yml).
#
# ACQUISITION ON: these franchises ADD missing entries to Radarr and SEARCH
# (add_missing/search are true globally in config.yml). radarr_tag applies the
# umbrella "Kometa-Added" + the "MovieCollection" category tag (the old
# HaynesTower Movies-template tag, PMM-Added -> Kometa-Added) to every ADDED
# item so Kometa's franchise acquisitions are traceable.
templates:
  Movies:
    sort_title: "!E <<collection_name>>"
    optional:
      - collection
      - tmdb_movie
      - tmdb_list
      - imdb_list
    tmdb_collection_details: <<collection>>
    tmdb_movie: <<tmdb_movie>>
    tmdb_list: <<tmdb_list>>
    imdb_list: <<imdb_list>>
    collection_order: release
    radarr_tag: "Kometa-Added,MovieCollection"
    # theatrical-window guard (owner ruling 2026-07-10): TMDb Collections can list
    # announced / in-production / still-theatrical entries — never search one until
    # its home (physical/digital) release per TMDB. Explicit mirror of the global
    # radarr.availability: released.
    radarr_availability: released

collections:
