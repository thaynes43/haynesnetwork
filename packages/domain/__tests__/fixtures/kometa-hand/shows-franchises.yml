  Gilmore Girls:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/gilmore-girls}
    url_poster: https://theposterdb.com/api/assets/361463
  Marvel Cinematic Universe:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/marvel-cinematic-universe}
  One Chicago:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/one-chicago}
  Shondaverse:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/shondaverse}
    url_poster: https://theposterdb.com/api/assets/371504
  Sons of Anarchy:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/sons-of-anarchy}
  Star Wars:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/star-wars}
  Walking Dead:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/the-walking-dead, tvdb_show: 427464}
    # two builders (list + show) → collection_order:custom (from template) is
    # invalid; order by release instead so the flagship 427464 stays included.
    collection_order: release
  Yellowstone:
    template: {name: Shows, tvdb_list_details: https://thetvdb.com/lists/yellowstone}

