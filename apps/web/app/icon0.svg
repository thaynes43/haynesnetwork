<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Browser-tab favicon: the DESIGN-006 D-01 hub-and-spoke mark in the brand
       accent (matches --color-accent in both themes; SVG files are outside the
       CSS hex-guard scope by design). This is icon0 of the App Router multi-icon
       set (icon0.svg + raster icon1/2/3.png + apple-icon.png), so the emitted
       <head> carries both an SVG link and PNG fallbacks — SVG-only favicons are
       skipped by some browser tab contexts, which is why the tab showed the
       default globe before the raster siblings were added. -->

  <path d="M16 13.9V7.3M20.4 21.5 26 24.8M11.6 21.5 6 24.8" stroke="#78be20" stroke-width="2"/>
  <circle cx="16" cy="19" r="3.1" fill="#78be20"/>
  <circle cx="16" cy="19" r="5.9" stroke="#78be20" stroke-width="1.8"/>
  <circle cx="16" cy="7" r="2.8" fill="#78be20"/>
  <circle cx="26.4" cy="25" r="2.8" fill="#78be20"/>
  <circle cx="5.6" cy="25" r="2.8" fill="#78be20"/>
</svg>
