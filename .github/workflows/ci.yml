name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22"

# Job names are the required status-check contexts (ADR-009): keep them stable.
jobs:
  lint-and-typecheck:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:css
      - run: pnpm typecheck

  test:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @hnet tests run against a real embedded Postgres 16 binary (ADR-010);
      # first run downloads it, cached via the pnpm store thereafter.
      - run: pnpm test

  build:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  build-image:
    # Hybrid trigger (donor lesson, todos-for-dues ci.yml): release-please's
    # GITHUB_TOKEN-created releases don't fire downstream workflows, so we
    # accept both release.published (PAT path) and manual tag re-push.
    # PR and main-push events run the same job as a validation build (no push).
    # Guarded on the Dockerfile existing so pre-Task-10 tags don't fail CI.
    # NOT a required check — do not add to required contexts.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'release' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Push to GHCR only on tag/release events; everything else is build-only.
      IMAGE_PUSH: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'release' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # release tag on release events; the fully-qualified ref otherwise
          # (refs/pull/N/merge on PRs, refs/heads/main, refs/tags/v*).
          ref: ${{ github.event.release.tag_name || github.ref }}
      - id: dockerfile
        run: echo "exists=$([ -f Dockerfile ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.dockerfile.outputs.exists == 'true' && env.IMAGE_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        if: steps.dockerfile.outputs.exists == 'true' && env.IMAGE_PUSH == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thaynes43/haynesnetwork
          tags: |
            type=raw,value=${{ github.event.release.tag_name || github.ref_name }}
            type=raw,value=latest
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.IMAGE_PUSH == 'true' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
