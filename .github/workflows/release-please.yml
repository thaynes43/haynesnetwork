name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write # keyless cosign: mint the Actions OIDC token for Fulcio (ADR-020)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Publish the image IN THIS run when release-please just cut a release. GITHUB_TOKEN can
      # push to GHCR (packages:write) — the "Actions don't trigger Actions" limit only blocks a
      # GITHUB_TOKEN-created *event* (the tag/release) from starting a SEPARATE workflow, so we
      # build+push right here instead of relying on a tag-triggered job. No PAT needed (same
      # pattern as the other repos that publish to GHCR straight from a workflow job).
      - if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v4

      - if: steps.release.outputs.release_created == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.release.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        if: steps.release.outputs.release_created == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thaynes43/haynesnetwork
          tags: |
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - id: build
        if: steps.release.outputs.release_created == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless cosign: sign the pushed image so the cluster's Kyverno policy
      # (verify-thaynes43-images) can admit ONLY images built by this workflow's OIDC
      # identity. No private key, no COSIGN_* secret — a short-lived Fulcio cert is minted
      # from the runner's `id-token`, the signature + cert land in the public Rekor log
      # (ADR-020 / OPS-006). Every step stays behind `release_created` like the publish steps.
      - if: steps.release.outputs.release_created == 'true'
        uses: sigstore/cosign-installer@v3

      # Sign BY DIGEST (not tag): the digest signature covers :vX.Y.Z and :latest at once,
      # and it is exactly what Kyverno verifies at admission. `--yes` skips the confirm prompt.
      - if: steps.release.outputs.release_created == 'true'
        run: cosign sign --yes ghcr.io/thaynes43/haynesnetwork@${{ steps.build.outputs.digest }}

      # In-run gate: assert the signature carries OUR workflow's OIDC identity. A verify
      # failure fails the job so an unsignable/mis-signed release is loud, never silent.
      #
      # Retry loop: `cosign sign` above can succeed while GHCR has not yet made the freshly
      # pushed signature layer readable to `cosign verify` (a registry propagation race that
      # surfaces as `Error: no signatures found` moments after a SUCCESSFUL sign). The image
      # IS signed; verify just queried too early. Retry up to 5 times with a 10s pause,
      # succeeding on the first clean pass and failing the step only if every attempt fails.
      - if: steps.release.outputs.release_created == 'true'
        run: |
          attempts=5
          for i in $(seq 1 "$attempts"); do
            if cosign verify ghcr.io/thaynes43/haynesnetwork@${{ steps.build.outputs.digest }} \
              --certificate-identity-regexp '^https://github.com/thaynes43/haynesnetwork/\.github/workflows/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com; then
              echo "cosign verify succeeded on attempt ${i}/${attempts}"
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "cosign verify attempt ${i}/${attempts} failed (likely GHCR signature-propagation lag); retrying in 10s..."
              sleep 10
            fi
          done
          echo "cosign verify failed after ${attempts} attempts"
          exit 1
