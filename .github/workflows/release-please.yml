name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Publish the image IN THIS run when release-please just cut a release. GITHUB_TOKEN can
      # push to GHCR (packages:write) — the "Actions don't trigger Actions" limit only blocks a
      # GITHUB_TOKEN-created *event* (the tag/release) from starting a SEPARATE workflow, so we
      # build+push right here instead of relying on a tag-triggered job. No PAT needed (same
      # pattern as the other repos that publish to GHCR straight from a workflow job).
      - if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v4

      - if: steps.release.outputs.release_created == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.release.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        if: steps.release.outputs.release_created == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thaynes43/haynesnetwork
          tags: |
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - if: steps.release.outputs.release_created == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
