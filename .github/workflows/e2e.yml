name: e2e

# ADVISORY (ADR-009 / ADR-010 C-07): e2e stays out of the required status-check
# contexts until hardening — do NOT add this job to branch protection.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Chromium only (the suite's single project); --with-deps pulls the system
      # libraries the runner image may lack (CI-only — locally plain install).
      - run: pnpm --filter web exec playwright install chromium --with-deps
      # globalSetup boots embedded Postgres 16 + the stub OIDC + `next dev`
      # (ADR-010 — no Docker/Testcontainers, no live Authentik).
      - run: pnpm --filter web e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
